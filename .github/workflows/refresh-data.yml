name: Refresh housing data

on:
  schedule:
    - cron: '17 8 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: refresh-housing-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run refresh
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
      - name: Publish refreshed data
        run: |
          if git diff --quiet -- src/data/monitor.json src/data/monitor.db; then
            echo "No data changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/monitor.json src/data/monitor.db
          git commit -m "chore(data): refresh housing monitor"
          git push
          gh workflow run deploy.yml --ref master

